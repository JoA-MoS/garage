name: CI
on:
  push:
    branches:
      - main
      - alpha
      - beta
      - next
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  # Nx Cloud org is disabled — run everything locally on the runner
  NX_NO_CLOUD: 'true'
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
  DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      # consider creating reusable action for this
      - uses: actions/checkout@v3
        name: Checkout [Trunk]
        if: ${{ github.event_name != 'pull_request' }}
        with:
          fetch-depth: 0
      - uses: actions/checkout@v3
        name: Checkout [PR]
        if: ${{ github.event_name == 'pull_request' }}
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@v3
      - name: Ensure affected base exists in history
        # The tracked "last successful run" SHA can be orphaned by a history
        # rewrite; fall back to HEAD~1 so nx affected doesn't crash
        run: |
          if ! git cat-file -e "$NX_BASE" 2>/dev/null; then
            echo "Base $NX_BASE not found in history; falling back to HEAD~1"
            echo "NX_BASE=$(git rev-parse HEAD~1)" >> "$GITHUB_ENV"
          fi
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm nx affected --target=lint --parallel --max-parallel=3
      - run: pnpm nx affected --target=test --parallel --max-parallel=2
      - run: pnpm nx affected --target=build --parallel --max-parallel=3
      # Deployment is handled by deploy-soccer-stats.yml. Keep CI limited to
      # validation so unrelated Vercel deploy targets do not pollute GitHub's
      # production deployment history for the Soccer Stats app.
      - run: pnpm nx affected --target=docker-build
      - run: pnpm nx affected --target=release
