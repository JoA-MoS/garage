name: Deploy Soccer Stats

on:
  push:
    branches:
      - main
  # Manual escape hatch: deploys all three stacks regardless of what changed
  workflow_dispatch:

permissions:
  id-token: write # OIDC token for assuming the AWS CD role
  contents: read

# Never run two pulumi ups against the same stacks concurrently
concurrency:
  group: deploy-soccer-stats
  cancel-in-progress: false

env:
  NX_NO_CLOUD: 'true'
  NX_LOAD_DOT_ENV_FILES: 'false'
  NX_TUI: 'false'
  PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Derive SHAs for nx affected
        uses: nrwl/nx-set-shas@0e2d18b530b83b68263ff7b74e46b1ba300c83fc # v3
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_CD_ROLE_ARN }}
          aws-region: us-west-2

      - name: Install Pulumi CLI
        run: |
          curl -fsSL https://get.pulumi.com | sh -s -- --version 3.251.0
          echo "$HOME/.pulumi/bin" >> "$GITHUB_PATH"

      # Push to main: deploy only affected stacks. Nx dependsOn encodes the
      # ordering (infra -> api-infra -> ui-infra) and pulls in builds and the
      # Docker image push. An API-code-only change rebuilds and pushes the
      # image; App Runner auto-deploys the new :dev tag on its own.
      - name: Deploy affected stacks
        if: github.event_name == 'push'
        run: pnpm nx affected --target=up --parallel=1

      - name: Deploy all stacks (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: pnpm nx run-many --target=up --projects=soccer-stats-infra,soccer-stats-api-infra,soccer-stats-ui-infra --parallel=1

      - name: Verify deployment health
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 https://d26g1hjb51pz2g.cloudfront.net/api/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: /api/health returned $STATUS — retrying in 15s (Aurora may be resuming)"
            sleep 15
          done
          echo "Health check failed after 5 minutes"
          exit 1
