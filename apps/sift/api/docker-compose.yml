version: '3.8'

services:
  sift-db:
    image: postgres:15
    container_name: sift-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sift
    ports:
      - '5433:5432'
    volumes:
      - sift-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: sift-adminer
    ports:
      - '8081:8080'
    depends_on:
      - sift-db
    restart: unless-stopped

volumes:
  sift-db-data:
